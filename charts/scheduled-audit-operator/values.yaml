image:
  repository: ghcr.io/mizcausevic-dev/scheduled-audit-operator
  tag: ""        # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""       # defaults to the release fullname

leaderElection: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
