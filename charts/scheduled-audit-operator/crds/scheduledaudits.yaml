apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scheduledaudits.ops.kineticgain.com
spec:
  group: ops.kineticgain.com
  names:
    kind: ScheduledAudit
    listKind: ScheduledAuditList
    plural: scheduledaudits
    singular: scheduledaudit
    shortNames:
      - saudit
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Image
          type: string
          jsonPath: .spec.image
        - name: Active
          type: integer
          jsonPath: .status.activeJobs
        - name: LastRun
          type: date
          jsonPath: .status.lastScheduleTime
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - schedule
                - image
              properties:
                schedule:
                  type: string
                image:
                  type: string
                command:
                  type: array
                  items:
                    type: string
                args:
                  type: array
                  items:
                    type: string
                suspend:
                  type: boolean
            status:
              type: object
              properties:
                cronJobName:
                  type: string
                activeJobs:
                  type: integer
                lastScheduleTime:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - reason
                      - message
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      observedGeneration:
                        type: integer
                        format: int64
